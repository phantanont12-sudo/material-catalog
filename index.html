<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสืบราคาวัสดุก่อสร้าง 77 จังหวัด</title>
<link href="https://fonts.googleapis.com/css2?family=Pridi:wght@500;600&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1E3A2A; --green-2:#2C5240; --gold:#B8912A; --gold-soft:#E7D9AE;
  --paper:#F7F5EF; --card:#FFFFFF; --ink:#242B23; --mut:#6B7263; --line:#E2DFD3;
  --warn:#8A5A00; --warn-bg:#FBF3DC; --ok:#1F6E43; --ok-bg:#E8F3EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--paper);color:var(--ink);font-size:16px}
header{background:var(--green);color:#fff;padding:22px 20px 18px;border-bottom:4px solid var(--gold)}
.wrap{max-width:960px;margin:0 auto}
.eyebrow{color:var(--gold-soft);font-size:13px;letter-spacing:.14em;text-transform:uppercase}
h1{font-family:'Pridi',serif;font-weight:600;font-size:clamp(22px,4vw,32px);line-height:1.25;margin:6px 0 4px}
.sub{color:#CFDCCF;font-size:13.5px;line-height:1.5}
.flow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;font-size:13px}
.flow span{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:4px 11px}
.bar{position:sticky;top:0;z-index:5;background:var(--paper);border-bottom:1px solid var(--line);padding:12px 20px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,#q{padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font:inherit;background:var(--card)}
#prov{max-width:240px;font-weight:500}
#q{flex:1;min-width:200px}
#q:focus,#prov:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:thin}
.chip{white-space:nowrap;border:1.5px solid var(--line);background:var(--card);border-radius:999px;padding:7px 13px;font-size:14px;cursor:pointer}
.chip small{color:var(--mut)}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chip.on small{color:var(--gold-soft)}
main{padding:16px 20px 60px}
.meta{color:var(--mut);font-size:14px;margin:4px 0 12px}
.notice{border-radius:12px;padding:12px 16px;margin-bottom:12px;font-size:14.5px;line-height:1.55}
.notice.warn{background:var(--warn-bg);border:1px solid #E5CD8F;color:var(--warn)}
.item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.top{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.txt{flex:1;min-width:220px}
.name{font-weight:500;line-height:1.45}
.tag{display:inline-block;font-size:12px;border-radius:6px;padding:2px 8px;margin-top:6px;margin-right:6px}
.tag.cat{color:var(--green-2);background:#EAF0E7}
.tag.src-p{color:var(--ok);background:var(--ok-bg);font-weight:600}
.tag.src-b{color:var(--warn);background:var(--warn-bg);font-weight:600}
.price{text-align:right;white-space:nowrap}
.price b{font-size:18px;color:var(--green)}
.price span{display:block;font-size:12.5px;color:var(--mut)}
.act{display:flex;gap:8px}
.pic,.survey-btn{white-space:nowrap;border-radius:10px;padding:9px 13px;font:inherit;font-size:14px;font-weight:500;text-decoration:none;cursor:pointer}
.pic{border:1.5px solid var(--gold);color:#7A5E12;background:#FBF6E7}
.pic:hover{background:var(--gold);color:#fff}
.survey-btn{border:1.5px solid var(--green);color:var(--green);background:var(--card)}
.survey-btn:hover{background:var(--green);color:#fff}
.panel{display:none;margin-top:12px;border-top:1.5px dashed var(--line);padding-top:12px}
.panel.open{display:block}
.panel h4{font-size:14px;color:var(--green-2);margin-bottom:8px}
.stores{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.store{border:1px solid var(--line);border-radius:10px;padding:10px}
.store.best{border:2px solid var(--ok);background:var(--ok-bg)}
.store a{display:block;font-weight:600;color:var(--green);text-decoration:none;margin-bottom:6px;font-size:14.5px}
.store a:hover{text-decoration:underline}
.store input{width:100%;padding:9px 10px;border:1.5px solid var(--line);border-radius:8px;font:inherit}
.store .win{display:none;margin-top:6px;font-size:13px;color:var(--ok);font-weight:700}
.store.best .win{display:block}
.panel .foot{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.save{border:none;background:var(--green);color:#fff;border-radius:10px;padding:9px 16px;font:inherit;font-weight:500;cursor:pointer}
.save:hover{background:var(--green-2)}
.saved-note{font-size:13px;color:var(--mut)}
#more{display:block;margin:18px auto;padding:12px 26px;border:1.5px solid var(--green);background:var(--card);color:var(--green);border-radius:10px;font:inherit;font-weight:500;cursor:pointer}
.empty{text-align:center;color:var(--mut);padding:40px 20px;line-height:1.7}
.empty .survey-btn{display:inline-block;margin-top:10px}
@media(max-width:620px){.price{margin-left:auto}}
</style>
</head>

<header><div class="wrap">

  <h1>สืบราคาวัสดุก่อสร้าง 77 จังหวัด</h1>
  <div class="flow">

  </div>
</div></header>

<div class="bar"><div class="wrap">
  <div class="controls">
    <select id="prov" aria-label="เลือกจังหวัดที่ทำงาน"></select>

  </div>
  <div class="chips" id="chips"></div>
</div></div>

<main class="wrap">
  <div id="notice"></div>
  <div class="meta" id="meta"></div>
  <div id="list"></div>
  <button id="more" hidden>แสดงเพิ่ม</button>
</main>

  provCode=code;provData=null;provIsAlias=false;
  if(code==='10'){provData=BKK}
  else if(manifest.available[code]==='bkk'){provData=BKK;provIsAlias=true}

    try{const r=await fetch(manifest.available[code]);if(r.ok)provData=await r.json()}catch(e){}
  }

function row(o,idx){
  const r=o.r,d=document.createElement('div');d.className='item';
  const srcTag=o.src==='p'?'<span class="tag src-p">ราคาจังหวัด'+(provCode==='10'?' กทม.':PROVINCES[provCode])+(provIsAlias?' (อ้างอิงส่วนกลาง กทม.)':'')+'</span>'
                          :'<span class="tag src-b">ราคา กทม. (ใช้แทน)</span>';
  d.innerHTML='<div class="top"><div class="txt"><div class="name">'+r[1]+'</div>'+
    srcTag+'<span class="tag cat">หมวด '+String(r[0]).padStart(2,'0')+' · '+CATS[r[0]]+'</span></div>'+
    '<div class="price"><b>'+r[3]+'</b><span>บาท / '+r[2]+'</span></div>'+
    '<div class="act"><a class="pic" target="_blank" rel="noopener" href="'+gq(r[1])+'">📷 รูป</a>'+
    '<button class="survey-btn">🏪 สืบ 3 ร้าน</button></div></div>'+
    '<div class="panel" id="pn'+idx+'"></div>';
  d.querySelector('.survey-btn').onclick=()=>togglePanel('pn'+idx,r[1]);
  return d;
}
function togglePanel(id,name){
  const pn=document.getElementById(id);
  if(pn.classList.contains('open')){pn.classList.remove('open');return}
  pn.innerHTML=panelHTML(name);pn.classList.add('open');wirePanel(pn,name);
}
function panelHTML(name){
  const saved=loadSaved()[name];
  let h='<h4>ขั้นที่ ③ สืบราคาจาก 3 ร้าน — กดชื่อร้านเพื่อค้นหาสินค้านี้ แล้วกรอกราคาที่เจอ ระบบจะเลือกถูกสุดให้</h4><div class="stores">';
  STORES.forEach((s,i)=>{
    const v=saved?saved.p[i]:'';
    h+='<div class="store" data-i="'+i+'"><a target="_blank" rel="noopener" href="'+s[1](storeQuery(name))+'">🔗 '+s[0]+'</a>'+
       '<input type="number" min="0" step="0.01" placeholder="ราคาที่เจอ (บาท)" value="'+(v||'')+'">'+
       '<div class="win">✓ ถูกสุด — ใช้ราคานี้</div></div>';
  });
  h+='</div><div class="foot"><button class="save">💾 บันทึกผลสืบราคา</button><span class="saved-note">'+
     (saved?'บันทึกล่าสุด '+saved.d:'ราคาที่บันทึกจะเก็บไว้ในเครื่องนี้')+'</span></div>';
  return h;
}
function wirePanel(pn,name){
  const inputs=[...pn.querySelectorAll('input')];
  const mark=()=>{
    const vals=inputs.map(x=>parseFloat(x.value));
    const valid=vals.filter(v=>v>0);
    pn.querySelectorAll('.store').forEach(s=>s.classList.remove('best'));
    if(valid.length){const min=Math.min(...valid);
      inputs.forEach((x,i)=>{if(parseFloat(x.value)===min)pn.querySelectorAll('.store')[i].classList.add('best')})}
  };
  inputs.forEach(x=>x.oninput=mark);mark();
  pn.querySelector('.save').onclick=()=>{
    const ok=saveSurvey(name,{p:inputs.map(x=>x.value),d:new Date().toLocaleDateString('th-TH')});
    pn.querySelector('.saved-note').textContent=ok?'✓ บันทึกแล้ว '+new Date().toLocaleDateString('th-TH'):'เบราว์เซอร์นี้ไม่รองรับการบันทึก';
  };
}
window.freeSurvey=()=>{
  const name=q.value.trim();if(!name)return;
  list.innerHTML='';const d=document.createElement('div');d.className='item';
  d.innerHTML='<div class="top"><div class="txt"><div class="name">'+esc(name)+'</div>'+
    '<span class="tag src-b">ไม่มีในฐานข้อมูล — สืบราคาเอง</span></div></div><div class="panel open" id="pnF"></div>';
  list.appendChild(d);
  const pn=document.getElementById('pnF');pn.innerHTML=panelHTML(name);wirePanel(pn,name);
  more.hidden=true;
};

// ---------- paging ----------
function page(){
  const frag=document.createDocumentFragment();
  cur.slice(shown,shown+PAGE).forEach((o,i)=>frag.appendChild(row(o,shown+i)));
  list.appendChild(frag);shown+=PAGE;
  more.hidden=shown>=cur.length;
  more.textContent='แสดงเพิ่ม ('+Math.max(cur.length-shown,0).toLocaleString()+' รายการที่เหลือ)';
}
more.onclick=page;
let t;q.oninput=()=>{clearTimeout(t);t=setTimeout(render,200)};

buildChips();
loadManifest().then(()=>switchProv('10'));
</script>
</body>
</html>
